<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Review & Feedback</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #e0e0e0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 20px; color: #4ecdc4; }
        .header p { font-size: 13px; color: #888; margin-top: 6px; }

        .slide-card {
            background: #16213e;
            border-radius: 12px;
            margin-bottom: 24px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .slide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #1a1a2e;
            border-bottom: 1px solid #333;
        }
        .slide-number {
            font-size: 14px;
            font-weight: 600;
            color: #4ecdc4;
        }
        .slide-status {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 10px;
            background: #2d4a3e;
            color: #4ecdc4;
        }
        .slide-status.has-feedback {
            background: #4a2d2d;
            color: #ff6b6b;
        }
        .slide-image {
            width: 100%;
            display: block;
            cursor: pointer;
        }
        .slide-image:hover { opacity: 0.95; }

        .feedback-area {
            padding: 16px 20px;
            border-top: 1px solid #333;
        }
        .feedback-area label {
            font-size: 12px;
            color: #888;
            display: block;
            margin-bottom: 6px;
        }
        .feedback-area textarea {
            width: 100%;
            min-height: 60px;
            background: #0f0f23;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 10px 12px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
        }
        .feedback-area textarea:focus {
            outline: none;
            border-color: #4ecdc4;
        }
        .feedback-area textarea::placeholder { color: #555; }

        .actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            border-top: 1px solid #333;
            padding: 14px 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 100;
        }
        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #4ecdc4;
            color: #1a1a2e;
        }
        .btn-primary:hover { background: #45b7aa; }
        .btn-secondary {
            background: #333;
            color: #e0e0e0;
        }
        .btn-secondary:hover { background: #444; }

        .summary {
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: #16213e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 12px;
            color: #888;
            z-index: 100;
        }
        .summary span { color: #ff6b6b; font-weight: 600; }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #2d4a3e; color: #4ecdc4; }
        .toast.error { background: #4a2d2d; color: #ff6b6b; }

        .spacer { height: 80px; }

        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            z-index: 300;
            cursor: pointer;
        }
        .fullscreen-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .fullscreen-overlay.active { display: flex; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PPT Review & Feedback</h1>
            <p>Review each slide. Add feedback to request edits. Save to update slides_plan.json.</p>
        </div>
        <div id="slides"></div>
        <div class="spacer"></div>
    </div>

    <div class="summary" id="summary"></div>

    <div class="actions">
        <button class="btn btn-primary" onclick="saveFeedback()">Save Feedback</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
    </div>

    <div class="fullscreen-overlay" id="fullscreen" onclick="closeFullscreen()">
        <img id="fullscreenImg" src="">
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const slides = [/* IMAGE_LIST_PLACEHOLDER */];

        async function loadFeedback() {
            try {
                const res = await fetch('/api/feedback');
                if (res.ok) return await res.json();
            } catch {}
            return {};
        }

        async function init() {
            const container = document.getElementById('slides');
            const saved = await loadFeedback();

            slides.forEach((src, i) => {
                const num = i + 1;
                const fb = saved[String(num)] || '';
                const hasFb = fb.length > 0;
                const card = document.createElement('div');
                card.className = 'slide-card';
                card.innerHTML = `
                    <div class="slide-header">
                        <span class="slide-number">Slide ${num} / ${slides.length}</span>
                        <span class="slide-status ${hasFb ? 'has-feedback' : ''}" id="status-${num}">
                            ${hasFb ? 'Needs Edit' : 'OK'}
                        </span>
                    </div>
                    <img class="slide-image" src="${src}" alt="Slide ${num}"
                         onclick="openFullscreen('${src}')">
                    <div class="feedback-area">
                        <label>Feedback (leave empty if no changes needed)</label>
                        <textarea id="fb-${num}"
                                  placeholder="e.g. Remove the footer / Change title to ..."
                                  oninput="onFeedbackChange(${num})">${fb}</textarea>
                    </div>
                `;
                container.appendChild(card);
            });

            updateSummary();
        }

        function onFeedbackChange(num) {
            const textarea = document.getElementById(`fb-${num}`);
            const status = document.getElementById(`status-${num}`);
            const hasFb = textarea.value.trim().length > 0;
            status.textContent = hasFb ? 'Needs Edit' : 'OK';
            status.className = `slide-status ${hasFb ? 'has-feedback' : ''}`;
            updateSummary();
        }

        function updateSummary() {
            let count = 0;
            slides.forEach((_, i) => {
                const textarea = document.getElementById(`fb-${i + 1}`);
                if (textarea && textarea.value.trim()) count++;
            });
            document.getElementById('summary').innerHTML = count > 0
                ? `<span>${count}</span> / ${slides.length} slides need edits`
                : `All ${slides.length} slides OK`;
        }

        async function saveFeedback() {
            const feedback = {};
            slides.forEach((_, i) => {
                const num = i + 1;
                const textarea = document.getElementById(`fb-${num}`);
                if (textarea && textarea.value.trim()) {
                    feedback[String(num)] = textarea.value.trim();
                }
            });

            try {
                const res = await fetch('/save-feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(feedback),
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    showToast(`Saved to slides_plan.json (${data.count} slides with feedback)`, 'success');
                } else {
                    showToast(`Error: ${data.message}`, 'error');
                }
            } catch (e) {
                showToast(`Connection error: ${e.message}`, 'error');
            }
        }

        function clearAll() {
            slides.forEach((_, i) => {
                const textarea = document.getElementById(`fb-${i + 1}`);
                if (textarea) textarea.value = '';
                onFeedbackChange(i + 1);
            });
            saveFeedback();
        }

        function openFullscreen(src) {
            document.getElementById('fullscreenImg').src = src;
            document.getElementById('fullscreen').classList.add('active');
        }
        function closeFullscreen() {
            document.getElementById('fullscreen').classList.remove('active');
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeFullscreen();
        });

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        init();
    </script>
</body>
</html>
