services:
  tyqa:
    build:
      context: .
    container_name: tyqa
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      # Working directory for the agent
      - ./workspace:/workspace
      # Persistent app data: sessions, global skills, memories, config
      - tyqa-data:/home/tyqa/.tyqa

volumes:
  tyqa-data:
